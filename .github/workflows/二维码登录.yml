name: 二维码登录
on:
  workflow_dispatch:
    inputs:
      number:
        description: "需要登录几个账号？"
        required: true
        default: "1"
      append_user:
        description: "是否追加新账号？（不删除已存在账号信息）"
        required: true
        type: choice
        default: "否"
        options:
          - 是
          - 否
      print_userinfo:
        description: "自动写入失败时是否在日志输出 USERINFO？（含登录token，默认否）"
        required: true
        type: choice
        default: "否"
        options:
          - 否
          - 是
permissions:
  contents: read
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 检出仓库
        uses: actions/checkout@v6
      - name: 创建 Node 环境
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: ./api/package-lock.json
      - name: 检查 GitHub CLI
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt update
            sudo apt install gh -y
          fi
          gh --version
      - name: 缓存依赖
        id: cache-npm
        uses: actions/cache@v5
        with:
          path: ./api/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('./api/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: 安装依赖
        run: npm run install
        if: ${{ steps.cache-npm.outputs.cache-hit != 'true' }}
      - name: 二维码登录
        run: npm run qrcodeLogin
        env:
          NUMBER: ${{ github.event.inputs.number }}
          PAT: ${{ secrets.PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          USERINFO: ${{ secrets.USERINFO }}
          APPEND_USER: ${{ github.event.inputs.append_user }}
          ALLOW_PRINT_USERINFO: ${{ github.event.inputs.print_userinfo }}
      - name: 上传二维码图片
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 二维码
          path: qr-code.png
          retention-days: 1
